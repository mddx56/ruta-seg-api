syntax = "proto3";

package target.position;

option go_package = "github.com/Caknoooo/go-gin-clean-starter/pkg/pb/position_proto";

message SavePositionRequest {
    string imei = 1;
    int64 device_time = 2; // Unix timestamp
    double latitude = 3;
    double longitude = 4;
    int32 speed = 5;
    int32 course = 6;
    string attributes = 7;
}

message SavePositionResponse {
    bool success = 1;
    string message = 2;
}

service PositionService {
    rpc SavePosition (SavePositionRequest) returns (SavePositionResponse);
}
