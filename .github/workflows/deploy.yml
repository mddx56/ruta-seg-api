name: Deploy API to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install Protoc & Generate gRPC Code
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          make proto || (
            protoc --go_out=. --go_opt=module=github.com/Caknoooo/go-gin-clean-starter --go-grpc_out=. --go-grpc_opt=module=github.com/Caknoooo/go-gin-clean-starter proto/device_service.proto
            protoc --go_out=. --go_opt=module=github.com/Caknoooo/go-gin-clean-starter --go-grpc_out=. --go-grpc_opt=module=github.com/Caknoooo/go-gin-clean-starter proto/position_service.proto
          )

      - name: Build Go App
        run: |
          # Compilamos el binario de la API y el de utilidades (reset-db)
          # Los nombramos de forma temporal (con sufijo -new) para evitar el error 'text file busy' al subirlos usando scp
          GOOS=linux GOARCH=amd64 go build -o ruta-api-new ./cmd/main.go
          GOOS=linux GOARCH=amd64 go build -o reset-db-new ./cmd/reset_db/main.go

      - name: Copy binaries to DigitalOcean
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          password: ${{ secrets.DO_PASSWORD }}
          source: "ruta-api-new,reset-db-new,.env,database/seeders/json"
          target: "/home/root/rutasegura/ruta-seg-api"

      - name: Stop, Migrate and Restart Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          password: ${{ secrets.DO_PASSWORD }}
          script: |
            cd /home/root/rutasegura/ruta-seg-api

            # 1. Si el servicio no existe, lo creamos y habilitamos
            SERVICE_FILE="/etc/systemd/system/ruta-seg-api.service"
            if [ ! -f "$SERVICE_FILE" ]; then
              echo "Servicio no encontrado, creando $SERVICE_FILE..."
              sudo tee "$SERVICE_FILE" > /dev/null <<'EOF'
            [Unit]
            Description=Ruta Segura API
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/home/root/rutasegura/ruta-seg-api
            ExecStart=/home/root/rutasegura/ruta-seg-api/ruta-api
            Restart=on-failure
            RestartSec=5
            EnvironmentFile=/home/root/rutasegura/ruta-seg-api/.env

            [Install]
            WantedBy=multi-user.target
            EOF
              sudo systemctl daemon-reload
              sudo systemctl enable ruta-seg-api
              echo "Servicio ruta-seg-api creado y habilitado"
            else
              # El servicio ya existe, lo detenemos para reemplazar binarios
              sudo systemctl stop ruta-seg-api
            fi

            # 2. Reemplazamos los binarios viejos con los nuevos de forma segura
            mv ruta-api-new ruta-api
            mv reset-db-new reset-db

            # 3. Damos permisos de ejecución
            chmod +x ruta-api
            chmod +x reset-db

            # 4. EJECUTAMOS LA MIGRACIÓN
            # Según tu código (script/command.go), este es el comando correcto
            ./ruta-api --migrate:run

            # 5. EJECUTAMOS EL SEED (idempotente: no duplica si el usuario ya existe)
            ./ruta-api --seed

            # En caso de querer usar la herramienta reset:
            # (Úsalo solo bajo tu propia responsabilidad ingresando tú mismo al ssh)
            # ./reset-db

            # 6. Iniciamos y validamos que el servicio esté activo
            sudo systemctl start ruta-seg-api
            sudo systemctl status ruta-seg-api --no-pager

            # 7. Validamos que el servicio ruta-seg-api esté corriendo (falla el deploy si no)
            if ! sudo systemctl is-active --quiet ruta-seg-api; then
              echo "ERROR: el servicio ruta-seg-api no está activo después del inicio"
              sudo journalctl -u ruta-seg-api --no-pager -n 50
              exit 1
            fi
            echo "OK: servicio ruta-seg-api activo y corriendo"
