basePath: /
definitions:
  dto.AdminResetPasswordRequest:
    properties:
      new_password:
        minLength: 4
        type: string
    required:
    - new_password
    type: object
  dto.BackupResponse:
    properties:
      data: {}
      message:
        type: string
    type: object
  dto.BulkImportItem:
    properties:
      cod_sim:
        type: string
      imei:
        type: string
      sim_phone_number:
        type: string
      sim_provider:
        type: string
    required:
    - cod_sim
    - imei
    type: object
  dto.BulkImportRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.BulkImportItem'
        minItems: 1
        type: array
    required:
    - items
    type: object
  dto.DashboardStatsResponse:
    properties:
      devices_with_installation:
        type: integer
      devices_without_installation:
        type: integer
      suspended_users:
        type: integer
      total_devices:
        type: integer
      total_groups:
        type: integer
      total_users:
        type: integer
      total_vehicles:
        type: integer
      users_with_installations:
        type: integer
    type: object
  dto.DeviceCreateRequest:
    properties:
      apn_conf:
        type: string
      cod_sim:
        type: string
      firmware_version:
        type: string
      group_id:
        type: string
      imei:
        maxLength: 20
        minLength: 15
        type: string
      model:
        type: string
      protocol:
        type: string
      remote_ip:
        type: string
      sim_phone_number:
        type: string
      sim_provider:
        type: string
      user_id:
        type: string
    required:
    - imei
    - model
    type: object
  dto.DeviceInstallationCreateRequest:
    properties:
      imei:
        description: IMEI
        type: string
      install_reason:
        type: string
      vehicle_id:
        type: string
    required:
    - imei
    - vehicle_id
    type: object
  dto.DeviceInstallationQuickCreateRequest:
    properties:
      chasis:
        description: Chasis del vehículo
        type: string
      imei:
        description: IMEI del dispositivo
        type: string
      install_reason:
        type: string
    required:
    - chasis
    - imei
    type: object
  dto.DeviceInstallationUninstallRequest:
    properties:
      removal_reason:
        type: string
    type: object
  dto.DeviceUpdateRequest:
    properties:
      apn_conf:
        type: string
      cod_sim:
        type: string
      firmware_version:
        type: string
      group_id:
        type: string
      imei:
        description: PK reference
        type: string
      model:
        type: string
      protocol:
        type: string
      remote_ip:
        type: string
      sim_phone_number:
        type: string
      sim_provider:
        type: string
      user_id:
        type: string
    required:
    - imei
    type: object
  dto.GroupAssignDeviceRequest:
    properties:
      device_imei:
        type: string
      group_id:
        type: string
    required:
    - device_imei
    - group_id
    type: object
  dto.GroupRemoveDeviceRequest:
    properties:
      device_imei:
        type: string
      group_id:
        type: string
    required:
    - device_imei
    - group_id
    type: object
  dto.LogSocketCreateRequest:
    properties:
      payload:
        type: string
    required:
    - payload
    type: object
  dto.MakeCreateRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  dto.MakeUpdateRequest:
    properties:
      id:
        type: string
      name:
        type: string
    required:
    - id
    type: object
  dto.ModelCreateRequest:
    properties:
      make_id:
        type: string
      name:
        type: string
      vehicle_type_id:
        type: string
    required:
    - make_id
    - name
    - vehicle_type_id
    type: object
  dto.ModelUpdateRequest:
    properties:
      id:
        type: string
      make_id:
        type: string
      name:
        type: string
      vehicle_type_id:
        type: string
    required:
    - id
    type: object
  dto.PositionCreateRequest:
    properties:
      attributes:
        type: string
      course:
        type: integer
      device_id:
        type: string
      device_time:
        type: string
      latitude:
        maximum: 90
        minimum: -90
        type: number
      longitude:
        maximum: 180
        minimum: -180
        type: number
      speed:
        type: integer
    required:
    - device_id
    - device_time
    - latitude
    - longitude
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 4
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  dto.SendPasswordResetRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.SendVerificationEmailRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.UserBlockRequest:
    properties:
      is_blocked:
        description: pointer para permitir false (desbloquear) y detectar ausencia
          del campo
        type: boolean
    required:
    - is_blocked
    type: object
  dto.UserChangePasswordRequest:
    properties:
      current_password:
        minLength: 4
        type: string
      new_password:
        minLength: 4
        type: string
    required:
    - current_password
    - new_password
    type: object
  dto.UserCreateRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      password:
        minLength: 4
        type: string
      telp_number:
        maxLength: 20
        minLength: 7
        type: string
      username:
        maxLength: 20
        minLength: 4
        type: string
    required:
    - email
    - name
    - password
    - username
    type: object
  dto.UserLoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - password
    type: object
  dto.UserMeUpdateRequest:
    properties:
      email:
        type: string
      image_url:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      telp_number:
        maxLength: 20
        minLength: 7
        type: string
      username:
        maxLength: 20
        minLength: 4
        type: string
    type: object
  dto.UserUpdateRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      telp_number:
        maxLength: 20
        minLength: 7
        type: string
    type: object
  dto.VehicleCreateRequest:
    properties:
      chasis:
        type: string
      color:
        type: string
      description:
        type: string
      km_liter:
        type: number
      model_id:
        type: string
      photo_url:
        type: string
      placa:
        type: string
      user_id:
        type: string
      year:
        type: integer
    required:
    - model_id
    - placa
    - user_id
    type: object
  dto.VehicleTypeCreateRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  dto.VehicleTypeUpdateRequest:
    properties:
      id:
        type: string
      name:
        type: string
    required:
    - id
    type: object
  dto.VehicleUpdateRequest:
    properties:
      chasis:
        type: string
      color:
        type: string
      description:
        type: string
      id:
        type: string
      km_liter:
        type: number
      model_id:
        type: string
      photo_url:
        type: string
      placa:
        type: string
      user_id:
        type: string
      year:
        type: integer
    required:
    - id
    type: object
  dto.VerifyEmailRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  utils.Response:
    properties:
      data: {}
      error: {}
      message:
        type: string
      meta: {}
      status:
        type: boolean
    type: object
host: localhost:8888
info:
  contact:
    email: mddx56@gmail.com
    name: API Support
    url: http://www.swagger.io/support
  description: API para gestionar motos
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: RutaSegura Api
  version: 0.1.2
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Login user with email and password
      parameters:
      - description: Login Request
        in: body
        name: login
        required: true
        schema:
          $ref: '#/definitions/dto.UserLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Login user
      tags:
      - auth
  /api/auth/logout:
    post:
      consumes:
      - application/json
      description: Logout user and invalidate token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh token
      parameters:
      - description: Refresh Token Request
        in: body
        name: refresh
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Refresh access token
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with the input payload
      parameters:
      - description: Register Request
        in: body
        name: register
        required: true
        schema:
          $ref: '#/definitions/dto.UserCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Register a new user
      tags:
      - auth
  /api/auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset user password
      parameters:
      - description: Reset Password Request
        in: body
        name: reset
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Reset password
      tags:
      - auth
  /api/auth/send-password-reset:
    post:
      consumes:
      - application/json
      description: Send password reset email to user
      parameters:
      - description: Send Password Reset Request
        in: body
        name: email
        required: true
        schema:
          $ref: '#/definitions/dto.SendPasswordResetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Send password reset email
      tags:
      - auth
  /api/auth/send-verification-email:
    post:
      consumes:
      - application/json
      description: Send verification email to user
      parameters:
      - description: Send Verification Email Request
        in: body
        name: email
        required: true
        schema:
          $ref: '#/definitions/dto.SendVerificationEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Send verification email
      tags:
      - auth
  /api/auth/verify-email:
    post:
      consumes:
      - application/json
      description: Verify user email
      parameters:
      - description: Verify Email Request
        in: body
        name: verify
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Verify email
      tags:
      - auth
  /api/backup/download:
    get:
      description: Descarga el archivo de respaldo completo (.sql) más reciente desde
        el servidor externo.
      produces:
      - application/octet-stream
      responses:
        "200":
          description: Archivo SQL de respaldo
          schema:
            type: file
        "401":
          description: No autorizado
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Acceso denegado (Solo Admin)
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Error interno o al descargar
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Descargar Backup Completo
      tags:
      - backup
  /api/backup/schema/download:
    get:
      description: Descarga el archivo de respaldo del esquema (.sql) más reciente
        desde el servidor externo.
      produces:
      - application/octet-stream
      responses:
        "200":
          description: Archivo SQL de esquema
          schema:
            type: file
        "401":
          description: No autorizado
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Acceso denegado (Solo Admin)
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Error interno o al descargar
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Descargar Backup del Esquema
      tags:
      - backup
  /api/backup/schema/trigger:
    post:
      consumes:
      - application/json
      description: Inicia el proceso de respaldo *solo del esquema* (sin datos) en
        el servidor externo.
      produces:
      - application/json
      responses:
        "200":
          description: Proceso iniciado correctamente
          schema:
            $ref: '#/definitions/dto.BackupResponse'
        "401":
          description: No autorizado
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Acceso denegado (Solo Admin)
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Iniciar Backup del Esquema
      tags:
      - backup
  /api/backup/trigger:
    post:
      consumes:
      - application/json
      description: Inicia el proceso de respaldo completo de la base de datos en el
        servidor externo.
      produces:
      - application/json
      responses:
        "200":
          description: Proceso iniciado correctamente
          schema:
            $ref: '#/definitions/dto.BackupResponse'
        "401":
          description: No autorizado
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Acceso denegado (Solo Admin)
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Iniciar Backup Completo
      tags:
      - backup
  /api/dashboard/stats:
    get:
      description: Retorna estadísticas básicas del sistema para el dashboard administrativo
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.DashboardStatsResponse'
              type: object
        "401":
          description: No autorizado
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Acceso denegado (Solo Admin)
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Error interno del servidor
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Obtener Estadísticas del Dashboard
      tags:
      - dashboard
  /api/device-installations:
    get:
      consumes:
      - application/json
      description: Get a paginated list of all device-vehicle installations
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Sort field
        in: query
        name: sort
        type: string
      - description: Sort order (asc, desc)
        in: query
        name: order
        type: string
      - description: Search term
        in: query
        name: search
        type: string
      - description: Relations to include (comma separated)
        in: query
        name: includes
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Get all device installations
      tags:
      - device-installations
    post:
      consumes:
      - application/json
      description: Create a new device-vehicle installation
      parameters:
      - description: Installation Request
        in: body
        name: installation
        required: true
        schema:
          $ref: '#/definitions/dto.DeviceInstallationCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Create a new device installation
      tags:
      - device-installations
  /api/device-installations/{id}/uninstall:
    put:
      consumes:
      - application/json
      description: End a device installation by setting the removed_at timestamp
      parameters:
      - description: Installation ID
        in: path
        name: id
        required: true
        type: string
      - description: Uninstall Request
        in: body
        name: uninstallation
        required: true
        schema:
          $ref: '#/definitions/dto.DeviceInstallationUninstallRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Uninstall a device
      tags:
      - device-installations
  /api/device-installations/device:
    get:
      consumes:
      - application/json
      description: Get all vehicle installations for a specific device (IMEI)
      parameters:
      - description: IMEI
        in: query
        name: imei
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Get installations by IMEI
      tags:
      - device-installations
  /api/device-installations/mine:
    get:
      consumes:
      - application/json
      description: Get active installations for vehicles owned by the authenticated
        user (mobile-friendly detail response)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Get my device installations (mobile)
      tags:
      - device-installations
  /api/device-installations/quick:
    post:
      consumes:
      - application/json
      description: Create a new device-vehicle installation using IMEI and vehicle
        chassis (for mobile quick registration)
      parameters:
      - description: Quick Installation Request
        in: body
        name: installation
        required: true
        schema:
          $ref: '#/definitions/dto.DeviceInstallationQuickCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Create a new device installation with IMEI and vehicle chassis
      tags:
      - device-installations
  /api/device-installations/vehicle:
    get:
      consumes:
      - application/json
      description: Get all device installations for a specific vehicle
      parameters:
      - description: Vehicle ID
        in: query
        name: vehicle_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Get installations by vehicle ID
      tags:
      - device-installations
  /api/devices:
    get:
      consumes:
      - application/json
      description: Get a list of all devices
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Get all devices
      tags:
      - devices
    post:
      consumes:
      - application/json
      description: Create a new device with the input payload
      parameters:
      - description: Device Create Request
        in: body
        name: device
        required: true
        schema:
          $ref: '#/definitions/dto.DeviceCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Create a new device
      tags:
      - devices
    put:
      consumes:
      - application/json
      description: Update device details
      parameters:
      - description: Device Update Request
        in: body
        name: device
        required: true
        schema:
          $ref: '#/definitions/dto.DeviceUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Update device
      tags:
      - devices
  /api/devices/{id}:
    get:
      consumes:
      - application/json
      description: Get a device by its IMEI
      parameters:
      - description: Device IMEI
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
